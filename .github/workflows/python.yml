name: python

on:
  push:
    branches: [main]
    paths:
      - "packages/spacellm/**"
      - "examples/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/python.yml"
  pull_request:
    paths:
      - "packages/spacellm/**"
      - "examples/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/python.yml"

concurrency:
  group: python-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: ${{ matrix.python }}

      - name: Sync workspace
        run: uv sync --all-extras --all-packages

      - name: Lint (ruff)
        run: uv run ruff check packages/spacellm

      - name: Format check (ruff)
        run: uv run ruff format --check packages/spacellm

      - name: Type check (mypy --strict)
        run: uv run mypy packages/spacellm/src

      - name: Tests
        run: uv run pytest packages/spacellm --cov=spacellm --cov-report=xml --cov-report=term

      - name: Upload coverage
        if: matrix.python == '3.13'
        uses: codecov/codecov-action@v6
        continue-on-error: true
        with:
          files: coverage.xml
          fail_ci_if_error: false

      - name: Run quickstart example
        run: uv run python examples/01_quickstart.py
