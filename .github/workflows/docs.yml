name: docs

on:
  push:
    branches: [main]
    paths:
      - "packages/docs/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "packages/docs/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/docs.yml"

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.13"

      - run: uv sync --all-extras --all-packages

      - name: Build site
        run: uv run --package spacellm-docs mkdocs build --strict -f packages/docs/mkdocs.yml

      - uses: actions/upload-artifact@v4
        with:
          name: docs-${{ github.sha }}
          path: packages/docs/site/
          retention-days: 7
