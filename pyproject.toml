[tool.uv.workspace]
members = ["packages/spacellm", "packages/docs"]

[tool.uv]
dev-dependencies = [
    "pytest>=8.3",
    "pytest-cov>=5.0",
    "ruff>=0.7",
    "mypy>=1.13",
    "hypothesis>=6.118",
]

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["packages/spacellm/src", "packages/spacellm/tests"]
extend-exclude = [".venv", "node_modules", "build", "dist"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "N",   # pep8-naming
    "SIM", # flake8-simplify
    "RUF", # ruff-specific
    "PT",  # pytest style
    "PL",  # pylint
    "PERF",
    "TID", # tidy imports
]
ignore = [
    "PLR0913", # too many arguments — relevant for protection APIs
    "PLR2004", # magic numbers — common in numeric tests
    "E501",    # handled by formatter
    "RUF002",  # ambiguous unicode in docstrings — physics notation (σ, ×, ², etc.) is intentional
    "RUF003",  # same as RUF002 but for comments
    "RUF001",  # same in docstrings/strings
]

[tool.ruff.lint.per-file-ignores]
"packages/spacellm/tests/**" = ["PLR2004", "S101"]
"packages/spacellm/src/spacellm/cli.py" = ["T201"]  # CLI prints
# Benchmark scripts are visualization code: matplotlib pipelines run long
# linearly and use many local variables. The default pylint complexity
# metrics fire on every chart function and are noise here.
"benchmarks/**" = ["PLR0912", "PLR0915", "RUF059", "SIM102"]

[tool.ruff.format]
docstring-code-format = true

[tool.mypy]
python_version = "3.11"
strict = true
warn_unreachable = true
warn_redundant_casts = true
warn_unused_ignores = true
no_implicit_reexport = true
show_error_codes = true
files = ["packages/spacellm/src"]

[[tool.mypy.overrides]]
module = ["torch.*", "transformers.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
minversion = "8.0"
addopts = "-ra -q --strict-markers --strict-config"
testpaths = ["packages/spacellm/tests"]
xfail_strict = true
filterwarnings = [
    "error",
    "ignore::DeprecationWarning:torch.*",
]

[tool.coverage.run]
source = ["packages/spacellm/src/spacellm"]
branch = true

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
]
